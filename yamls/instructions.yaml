  - type: section_header
    content: "Question 4: Rate your agreement with this statement"
  - type: text
    content: "Statement: *'My main task is to act as an **OBSERVER** and watch Elfie execute plans.'*"
  - type: likert_scale
    name: "what_is_task_q"
    question: "Please rate your level of agreement."
    labels:
      1: "**Strongly<br>Disagree**<br>(I am an active planner)"
      3: "Neutral"
      5: "**Strongly<br>Agree**<br>(I am only an observer)"

  common_intro:
  - type: text
    content: Welcome! Meet our main characters, Elfie the Elf, the Delicious Cookie 🍪 and the dreaded cliffs.
  - type: image_group
    images:
    - path: imgs/elf_down.png
      alt: Elfie
      caption: Elfie
    - path: imgs/cookie.png
      alt: Cookie
      caption: Delicious Cookie
    - path: imgs/mountain_cliff.png
      alt: Cliff
      caption: The Cliffs (Avoid)
      
  goal_and_anonymity:
  - type: emphasis_box
    color: green
    title: Your Objective
    items:
    - Elfie the Elf wants to get to the cookie 🍪.
    - Help Elfie **plan** the **best** path to the cookie. 
    - Decide what **best** is (shortest, safest, a combination, etc.).
    - Play 5 **modified** Cliff World games (5 rounds each).
  - type: emphasis_box
    color: yellow
    title: ""
    items:
    - Track progress via the **progress bar** above each page.
    - Complete **all** mini-games in **one sitting**.
    - You will **not be able to use** your **USER ID** to log in again.
    - Please **don't click** on the **Back button** in your browser.
    - You will be **logged out** after 10 minutes of inactivity.
  - type: emphasis_box
    color: gray
    title: Payment is contingent on
    items:
    - "**Completion** of **all** mini-games in **one sitting**."
    - "Paying **careful attention** to the instructions."
    # - "You will not be able to continue if you fail a comprehension check later."
  - type: emphasis_box
    color: pink
    title: Removal from the Study
    items:
    - Please pay careful attention to the instructions.
    - "A **Comprehension Check** later will test your understanding of the instructions."
    - You will **not be allowed** to complete the study if you fail it **thrice**.

