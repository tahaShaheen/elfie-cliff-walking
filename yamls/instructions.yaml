  - type: new_card
    display_mode: main_only
  - type: emphasis_box
    color: pink
    title: "⚠️ Comprehension Check "
    items:
    - "Answer these questions to confirm you **understand** the instructions."
    - "After three failed attempts, you **will not be able to continue**."
    - "You will be paid **only** if you complete **all** mini-games."

  - type: new_card
