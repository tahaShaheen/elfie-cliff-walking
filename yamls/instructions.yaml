  # --- Main Instruction Text Blocks ---
  main_instructions_stable_text_block:
  - type: header
    content: 'The Ground is Stable'
  - type: text
    content: In this realm, the ground is made of **safe and stable**
      tiles. You don't have to worry about accidentally slipping.
  - type: emphasis_box
    color: blue
    title: 'Relax: Stable Ground!'
    items:
    - "On **STABLE** ground, cliff edges are **completely safe**."
    - "Elfie will **not** accidentally slip if her plan takes her past an edge."
    - "Elfie is **always safe** on tiles **not adjacent** to cliffs."
    - "Diagonal movement is **not possible**."
  # - type: image_group
  #   images:
  #   - path: imgs/mountain_cliff.png
  #     alt: Cliff
  #     caption: Cliff Tile (Avoid)
  #   - path: imgs/mountain_cliff_skull.png
  #     alt: Elfie fell
  #     caption: Walking onto a cliff tile

  main_instructions_slippery_text_block:
  - type: header
    content: 'The Ground is Slippery'
  - type: text
    content: BE CAREFUL! In this realm, the ground is made of **extremely slippery** tiles
        that slope towards the cliffs.
  - type: emphasis_box
    color: yellow
    title: 'Danger: Slippery Surface!'
    items:
    - "On **SLIPPERY** ground, cliff edges are **dangerous**."
    - "Elfie could **accidentally slip** off a **cliff** if her plan takes her past an edge."
    - "Elfie is **always safe** on tiles **not adjacent** to cliffs."
    - "Diagonal movement is **not possible**."
  # - type: image_group
  #   images:
  #   - path: imgs/mountain_cliff.png
  #     alt: Cliff
  #     caption: Cliff Tile (Avoid)
  #   - path: imgs/mountain_cliff_skull.png
  #     alt: Elfie fell
  #     caption: Slipping over the edge

  # --- Original Unchanged Components Follow ---
  comparisons_common_header:
  - type: section_header
    content: 'Pick the Best Path'

  comparisons_common_instructions:
  - type: emphasis_box
    color: blue
    title: Your Task in this Mini-Game
    items:
    - "You will see **two videos** of how Elfie **plans** to get to the cookie."
    - "**Select** the plan you think is **best**."
    - "Both plans will be **shown at the same time.**"
    - "If you **cannot decide between the two**, pick any plan."
    - "You can **replay the videos as many times** as you want before making a choice."

  demonstrations_common_header:
  - type: section_header
    content: 'Show Elfie the Best Path'

  demonstrations_common_header_post:
  - type: section_header
    content: "Show Elfie the Best Path"
  - type: text
    content: "*You have seen this mini-game before. Has your strategy changed since?*"

  demonstrations_common_instructions:
  - type: emphasis_box
    color: blue
    title: Your Task in this Mini-Game
    items:
    - "**Show** Elfie a plan you think is the **best**."
    - "**Create a plan** to get to the cookie by **selecting tiles**, from **Elfie to the cookie**."
    - "The plan you create for Elfie will be highlighted."
  
  demonstration_common_text:
  - type: emphasis_box
    color: gray
    title: How to Show Elfie Your Plan
    items:
    - "Use your **Arrow Keys** ⬅️ ⬆️ ➡️ ⬇️ or **click** on a valid, adjacent tile."
    - "You must select **one tile at a time**."
    - "If you make a mistake, click the **Reset** button or press **Backspace** (delete on Mac) to start the attempt over."
    # - "The **visual example below** shows you how it works."
  - type: section_header
    content: 'Look at this Visual Example to See How It Works'

  # The STABLE version, showing a direct path.
  demonstration_interactive_guide_stable:
  - type: include
    id: demonstration_common_text
  - type: render_environment_statically
    map_data:
      <<: *practice_map_data
    caption: "**Starting a Path:** To begin, click an adjacent highlighted square or use your Arrow Keys."
    path_data:
      correction-target-cell: [[1, 11], [0, 10]]
    overlays:
      - image_path: "imgs/mouse_pointer.png" 
        position: [1, 11]
  - type: render_environment_statically
    map_data:
      <<: *practice_map_data
    caption: "**Path Progressing:** Your path now includes the new selection. The next set of valid moves are highlighted."
    path_data:
      path-cell: [[0, 11]]
      current-pos-highlight: [[1, 11]]
      correction-target-cell: [[2, 11]]
  - type: render_environment_statically
    map_data:
      <<: *practice_map_data
    caption: "**Continue Building:** Select more tiles until you reach the cookie."
    path_data:
      correction-target-cell: [[2, 7], [3, 6], [4, 7]] # Valid Next Selection
      current-pos-highlight: [[3, 7]] # Current position
      path-cell: [[1, 11], [2, 11], [2, 10], [3, 10], [3, 9], [3, 8]] # Already selected path cells
  - type: divider

