reusable_data:
  practice_map_data: &practice_map_data
    grid_rows: 6
    grid_cols: 12
    start_state: [0, 11]
    goal_state: [0, 0]
    cliff_states:
    - [0, 8]
    - [0, 9]
    - [1, 1]
    - [1, 2]
    - [1, 3]
    - [1, 5]
    - [1, 9]
    - [1, 10]
    - [2, 2]
    - [2, 4]
    - [2, 5]
    - [2, 9]
    - [3, 3]
    - [3, 4]
    - [4, 8]
    - [5, 4]
    - [5, 5]
    - [5, 8]
    - [5, 9]

  plan_vs_exec_animation: &plan_vs_exec_animation
    type: render_plan_execution_comparison
    animation_speed: 300
    banner_text: "Note: You will **NEVER** see Elfie move."
    map_data:
      grid_rows: 3
      grid_cols: 5
      start_state: [1, 0]
      goal_state: [1, 4]
      cliff_states: [[0, 1], [0, 2], [0, 3]]
    trajectory: [[1, 0], [1, 1], [1, 2], [1, 3], [1, 4]]
    plan_map:
      title: "The Plan"
      caption: "**You** will come up with a **plan** on how to solve a map. This is an example of what it might look like."
    # execution_header: "Examples of what you will **NOT** see in the games"
    # exec_safe_map:
    #   title: ""
    #   caption: "Elfie following the plan above on Stable Tiles (and not slipping)."
    # exec_slip_map:
    #   title: ""
    #   caption: "Elfie following the plan above on Slippery Tiles (and slipping)."


instruction_components:
  ffq_stable_section:
    - type: divider
    - type: render_animated_map
      map_data:
        grid_rows: 4
        grid_cols: 7
        start_state: [3, 0]
        goal_state: [3, 6]
        cliff_states: [[1, 2], [1, 3], [1, 4], [3, 2], [3, 3], [3, 4]]
      tile_type: "stable"
      caption: "One of the two realms as they will appear in the mini-games.\nThis is how Elfie would move on this type of ground."
      animation_speed: 300
      trajectory: [[3, 0], [3, 0], [2, 0], [2, 1], [2, 2], [2, 3], [2, 4], [2, 5], [2, 6], [3, 6]]
    - type: large_image
      path: "imgs/grass_actual_picture.jpg"
      caption: "This is what the ground looks like up close in this realm."
    - type: likert_scale
      name: "stable_rating" 
      question: "On a scale where 1 is **Rough & Stable** and 5 is **Slick & Slippery**, how would you rate the realm above?"

  ffq_slippery_section:
    - type: divider
    - type: render_animated_map
      map_data:
        grid_rows: 4
        grid_cols: 7
        start_state: [3, 0]
        goal_state: [3, 6]
        cliff_states: [[1, 2], [1, 3], [1, 4], [3, 2], [3, 3], [3, 4]]
      tile_type: "slippery"
      caption: "One of the two realms as they will appear in the mini-games.\nThis is how Elfie would move on this type of ground."
      animation_speed: 300
      # Provide a list of possible trajectories. The script will pick one at random for each animation loop.
      trajectories:
        - [[3, 0], [3, 0], [2, 0], [2, 1], [2, 2], [2, 3], [1, 3]] # slips off middle cliff (top)
        - [[3, 0], [3, 0], [2, 0], [2, 1], [2, 2], [2, 3], [3, 3]] # slips off middle cliff (bottom)
        - [[3, 0], [3, 0], [2, 0], [2, 1], [2, 2], [2, 3], [2, 4], [1, 4]] # slips off right cliff (top)
        - [[3, 0], [3, 0], [2, 0], [2, 1], [2, 2], [2, 3], [2, 4], [3, 4]] # slips off right cliff (bottom)
    - type: large_image
      path: "imgs/ice_actual_picture.jpg"
      caption: "This is what the ground looks like up close in this realm."
    - type: likert_scale
      name: "slippery_rating"
      question: "On a scale where 1 is **Rough & Stable** and 5 is **Slick & Slippery**, how would you rate the realm above?"

  plan_vs_execution_common_text:
  - type: text
    content: "In all the mini-games, you can help Elfie **only** in **PLANNING** before she goes on her journey. In the distant realm, Elfie will have to trust you and follow the plans. You will **not** be there to see Elfie actually follow that plan."

  plan_vs_execution_common_elements:
  - type: include
    id: plan_vs_execution_common_text
  - <<: *plan_vs_exec_animation
  - type: emphasis_box
    color: gray
    title: "A Note Regarding Planning"
    items:
    - "You are **only** drawing a path on maps for Elfie to follow (example above)." 
    - "You **won't actually see** Elfie walk along it. This is why you have to plan with care."
    - "On **STABLE ground**, Elfie would be **completely safe** following the plan shown above."
    - "On **SLIPPERY ground**, Elfie **risks slipping** and falling off the cliff if she follows the plan shown above."

  manipulation_check_questions_post:
  - type: new_card
    display_mode: main_only
  - type: section_header
    content: "Question 1: Consider this plan ..."
  - type: render_plan_execution_comparison
    animation_speed: 300
    plan_map:
      title: ""
      caption: ""
    map_data:
      grid_rows: 3
      grid_cols: 5
      start_state: [1, 0]
      goal_state: [1, 4]
      cliff_states: [[0, 1], [0, 2], [0, 3]]
    trajectory: [[1, 0], [1, 1], [1, 2], [1, 3], [1, 4]]
  - type: likert_scale
    name: "slippery_outcome_q"
    question: "How likely do you think it is that Elfie will **slip** if she follows the plan above?"
    labels:
      1: "Extremely<br>Unlikely"
      3: "Neutral"
      5: "Extremely<br>Likely"

  - type: new_card
    display_mode: main_only
  - type: section_header
    content: "Question 2: Consider this plan ..."
  - type: render_plan_execution_comparison
    animation_speed: 300
    plan_map:
      title: ""
      caption: ""
    map_data:
      grid_rows: 3
      grid_cols: 5
      start_state: [1, 0]
      goal_state: [1, 4]
      cliff_states: [[0, 1], [0, 2], [0, 3]]
    trajectory: [[1, 0], [2, 0], [2, 1], [2, 2], [2, 3], [2, 4], [1, 4]]
  - type: likert_scale
    name: "slippery_outcome_q_2"
    question: "How likely do you think it is that Elfie will **slip** if she follows the plan above?"
    labels:
      1: "Extremely<br>Unlikely"
      3: "Neutral"
      5: "Extremely<br>Likely"

