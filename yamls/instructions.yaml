  - type: new_card
    display_mode: main_only
  - type: section_header
    content: "Question 3: Rate your agreement with this statement"
  - type: text
    content: "Statement: *'The mini-games are about **PLANNING** only. I will **NOT** see Elfie actually move along the path.'*"
  - type: likert_scale
    name: "execution_q"
    question: "Please rate your level of agreement."
    labels:
      1: "**Strongly<br>Disagree**<br>(Elfie moves during the mini-games)"
      3: "Neutral"
      5: "**Strongly<br>Agree**<br>(Elfie never moves during the mini-games)"

  - type: new_card
