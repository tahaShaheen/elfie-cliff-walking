# First, define a reusable base environment with an anchor (&base_ffq_env)
base_ffq_env: &base_ffq_env
  map_layout:
    - "FFFFFF"
    - "FFHHFF"
    - "FFFFFF"
    - "SFHHFG"

# Now, use the base in your environment definitions
free_form_questions_environments:
  ffq_stable:
    <<: *base_ffq_env  # This line merges in the content from base_ffq_env
    name: "Stable Ground Sample"

  ffq_slippery:
    <<: *base_ffq_env  # This also merges in the same content
    name: "Slippery Ground Sample"
    tile_type: "ice"  # You can still add or override keys

