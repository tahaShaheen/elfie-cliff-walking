# First, define a reusable base environment with an anchor (&base_ffq_env)
base_ffq_env: &base_ffq_env
  map_layout:
    - "FFFFFF"
    - "FFHHFF"
    - "FFFFFF"
    - "SFHHFG"

# Now, use the base in your environment definitions
free_form_questions_environments:
  ffq_stable:
    <<: *base_ffq_env  # This line merges in the content from base_ffq_env
    name: "Stable Ground Sample"

  ffq_slippery:
    <<: *base_ffq_env  # This also merges in the same content
    name: "Slippery Ground Sample"
    tile_type: "ice"  # You can still add or override keys

common_ffq_template: &common_template
  elements:
    - type: divider
    - type: include
      id: common_intro
    - type: include
      id: goal_and_anonymity
    - type: include
      id: common_free_form_question_header
    - type: text
      content: "For the upcoming mini-games, Elfie will be dropped randomly into one of two realms."
    - type: text
      content: "Let's start by getting your first impressions. **Which option describes each realm best?** Consider its textures and properties."
    # - type: divider

    # These two 'include' statements will be randomly ordered by the server
    - type: include
      id: ffq_stable_section
    - type: include
      id: ffq_slippery_section


# This config uses the template above for everyone, removing the old group logic.
free_form_question_config:
  default:
    <<: *common_template