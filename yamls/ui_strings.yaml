  thank_you_page:
    title: Experiment Complete
    message_main: Thank You!
    message_completed_all: You have successfully completed all mini-games.
    message_can_close: Do not close this window yet.
    # DEBRIEFING FORM TEXT ---
    debrief_form_title: "DEBRIEFING FORM"
    debrief_form_intro: "Thank you for your valuable contribution to our study! The purpose of this document is to provide you with information about the study you participated in and its educational value."
    
    debrief_section_1_title: "1. The Problem We Are Investigating"
    debrief_section_1_content: "Our study is focused on investigating if a person's beliefs about how the world works influence the feedback or guidance they provide to an Artificial Intelligence (AI) agent.\n\nHuman feedback is crucial for aligning AI systems with what people want. You participated in a task where you helped an AI agent get from a starting point to a goal in a grid-world. Your role was to provide guidance to the agent, but the key element we were studying was how your understanding of the environment affected the plans you helped create."

    debrief_section_2_title: "2. The Importance of This Research in Psychology"
    debrief_section_2_content: "This research fits into a field known as Human-Robot Interaction (HRI). HRI draws from Computer Science and Robotics, Psychology, and the Behavioral Sciences.\n\nWe are trying to better understand the beliefs and assumptions that people have and how these shape how they teach robots to do tasks. If a human doesn't understand the environment in which a task is to be done, they might teach a robot a suboptimal or incorrect way of doing that task. This is an assumption made in a lot of the research literature and we are trying to empirically see if this is true. For example, imagine a passenger is helping teach a self-driving car (like Waymo). A passenger, under the assumption that the road is slippery due to rainfall will teach the car to be “careful”. If this belief does not match the actual road conditions or if the road being slippery doesn't actually affect the car because it has tires that never slip, the car learning to be “careful” is making it learn a suboptimal way of doing something."
    
    debrief_section_3_title: "3. Our Central Hypothesis and the Study's Design"
    debrief_section_3_content: "Our central hypothesis was that a mismatch between a person's belief about an environment and the environment's actual properties would produce the greatest difference between the guidance they provide and the truly optimal path.\n\nSome participants were part of a **'mismatched'** group. This is where a minor form of deception was used in the study's design. Some participants were shown visuals of stable, grassy terrain but were told its physics were slippery and unpredictable. Other participants were shown visuals of slippery, icy terrain but were told its physics were stable and non-slippery. For the participants in the **'matched'** group, the visuals matched the description of the terrain.\n\nThis intentional mismatch was essential for our research. It allowed us to separate the influence of your belief from the influence of the environment's actual characteristic. By comparing the results from the 'mismatched' groups to the 'matched' groups (where visuals and information aligned), we can isolate and measure the specific impact that belief has on behavior. We predicted that, when there was conflict between what the ground looked like (strongly associated with a slippery nature or stable rough nature) and what you were told (belief), the path you provided would be different from the ideal path for that specific environment."

    debrief_section_4_title: "4. Further Questions"
    debrief_section_4_content: "We greatly appreciate your time and effort. Your participation has provided us with valuable data. If you have any further questions about this study, please do not hesitate to contact us:\n\nTaha Shaheen (taha.shaheen@asu.edu)\nDr Stephen West (sgwest@asu.edu)\nDr Yu “Tony” Zhang (yu.zhang.442@asu.edu)\n\n**(2) IRB CONTACT INFORMATION**\nRichard Gilmour: rgilmou@asu.edu"
    
    debrief_key_facts_header: "Your Personal Session Summary"

    message_elfie_thanks: 'Elfie appreciates your help! 🍪'
    message_gift_card_info: 'If you requested payment, eligible submissions will receive a $5 Amazon gift card sent to the email address you provided. Please allow up to two weeks for processing. If you have any questions or concerns, feel free to contact us at taha.shaheen@asu.edu.'
