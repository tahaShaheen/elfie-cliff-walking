<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstration Task</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='imgs/elf_down.png') }}" type="image/png">
</head>

<body class="bg-gray-100">


    <div id="mobile-warning-overlay" class="hidden">
        <div class="overlay-backdrop">
            <div class="warning-box">
                <div class="warning-icon-container">
                    <svg class="warning-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M8.257 3.099c.636-1.214 2.43-1.214 3.066 0l7.106 13.572c.636 1.214-.265 2.729-1.533 2.729H2.684c-1.268 0-2.169-1.515-1.533-2.729L8.257 3.099zM10 12a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0 1 1 0 012 0z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <div>
                    <p id="mobile-warning-title" class="warning-text-title"></p>
                    <p id="mobile-warning-text" class="warning-text-body"></p>
                    <p id="mobile-warning-action" class="warning-text-body"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="game-page-container">
        <div id="practice-banner-container"></div>
    </div>

    <div id="game-loader" class="content-container game-page-container flex items-center justify-center"
        style="min-height: 300px;">
        <p id="loader-text" class="text-xl text-gray-600">Loading mini-game ...</p>
    </div>
    <div id="game-scale-wrapper">

        <div id="actual-game-content" class="content-container game-page-container hidden">
            <div id="task-banners-area" class="border-b border-gray-200 pb-4 mb-6">
                <div id="task-instructions-container"></div>
            </div>
            <div class="task-header-area pt-6">
                <h1 id="page-title" class="task-title border-b-0 pb-0 mb-0"></h1>
            </div>
            <div id="message-box" class="message-box-placeholder"></div>
            <div class="task-main-content">
                <div class="grid-wrapper">
                    <div id="grid-container" class="grid-container"></div>
                </div>
            </div>
            <div class="controls flex flex-col items-center gap-4">
                <div class="flex flex-row flex-wrap justify-center items-center gap-4">
                    <button id="resetButton" class="btn btn-secondary">Reset Attempt</button>
                    <button id="proceedButton" class="btn btn-success hidden">Proceed</button>
                </div>
                <div id="move-controls" class="flex flex-row justify-center items-center gap-4 mt-2">
                    <button id="move-left"
                        class="btn btn-secondary w-14 h-14 text-2xl flex items-center justify-center">&larr;</button>
                    <div class="flex flex-col gap-2">
                        <button id="move-up"
                            class="btn btn-secondary w-14 h-14 text-2xl flex items-center justify-center">&uarr;</button>
                        <button id="move-down"
                            class="btn btn-secondary w-14 h-14 text-2xl flex items-center justify-center">&darr;</button>
                    </div>
                    <button id="move-right"
                        class="btn btn-secondary w-14 h-14 text-2xl flex items-center justify-center">&rarr;</button>
                </div>
            </div>
        </div>
    </div>

    <!-- <div class="game-page-container">
        <div id="message-box" class="message-box-placeholder"></div>
    </div> -->

    <script>
        const utilsScript = document.createElement('script');
        utilsScript.src = `{{ url_for('static', filename='js/utils.js') }}?t=${new Date().getTime()}`;
        document.body.appendChild(utilsScript);
        utilsScript.onload = () => {
            const demonstrationsScript = document.createElement('script');
            demonstrationsScript.src = `{{ url_for('static', filename='js/demonstrations.js') }}?t=${new Date().getTime()}`;
            document.body.appendChild(demonstrationsScript);
        };
    </script>
</body>
<div id="progress-bar-container"
    class="fixed top-0 left-0 w-full bg-gray-100 border-b border-gray-300 z-50 p-2 hidden shadow-sm">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-1">
            <span id="progress-milestone-text" class="text-sm font-semibold text-gray-700"></span>
            <span id="progress-round-text" class="text-sm text-gray-600"></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="progress-bar" class="bg-red-700 h-2 rounded-full transition-all duration-300" style="width: 0%">
            </div>
        </div>
    </div>
</div>

</html>
